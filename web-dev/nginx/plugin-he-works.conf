# ──────────────────────────────────────────────────────────────────────
# He Backs Up — 플러그인 소개 사이트 Nginx 설정
# 도메인: plugin.he-works.co
#
# [로컬 → 서버 파일 업로드]
#   scp -r web-dev/html/ oracle:/opt/sites/heworks-plugins
#
# 업로드 후 서버 디렉토리 구조:
#   /opt/sites/heworks-plugins/
#   └── he-backs-up/
#       ├── index.html
#       ├── privacy.html
#       └── assets/
#           └── css/
#               └── style.css
#
# [Git 레포 원본 위치]
#   /home/ubuntu/oracle-server/oci-os/config/nginx/plugin-he-works.conf
#
# [Nginx 설정 적용 방법]
# 1. 이 파일을 서버의 Nginx 설정 디렉토리에 복사
#    scp web-dev/nginx/plugin-he-works.conf oracle:/home/ubuntu/oracle-server/oci-os/config/nginx/
# 2. 서버에서: sudo nginx -t          ← 문법 검사
# 3. 서버에서: sudo nginx -s reload   ← 설정 적용
# ──────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name plugin.he-works.co;

    # 정적 파일 루트 (서버 규칙: /opt/sites/)
    root /opt/sites/heworks-plugins;

    # 로그
    access_log /var/log/nginx/heworks-plugins-access.log;
    error_log  /var/log/nginx/heworks-plugins-error.log;

    # ── 메인 페이지: /he-backs-up ─────────────────────────────────
    location = /he-backs-up {
        try_files /he-backs-up/index.html =404;
    }

    location = /he-backs-up/ {
        try_files /he-backs-up/index.html =404;
    }

    # ── 개인정보처리방침: /he-backs-up/privacy ────────────────────
    location = /he-backs-up/privacy {
        try_files /he-backs-up/privacy.html =404;
    }

    location = /he-backs-up/privacy/ {
        try_files /he-backs-up/privacy.html =404;
    }

    # ── CSS, JS, 이미지 등 정적 파일 ─────────────────────────────
    location ^~ /he-backs-up/assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── /he-backs-up 하위 나머지 경로 fallback ────────────────────
    location ^~ /he-backs-up/ {
        try_files $uri =404;
    }

    # ── 보안 헤더 ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── gzip 압축 ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}

# ──────────────────────────────────────────────────────────────────────
# HTTPS (Let's Encrypt 인증서 발급 후 사용)
#
# 발급 명령어 (서버에서 실행):
# sudo certbot --nginx -d plugin.he-works.co
#
# certbot이 자동으로 아래 블록을 생성해주지만,
# 수동으로 하려면 아래 주석을 해제하고 경로 확인 후 사용하세요.
# ──────────────────────────────────────────────────────────────────────
# server {
#     listen 443 ssl;
#     server_name plugin.he-works.co;
#
#     ssl_certificate     /etc/letsencrypt/live/plugin.he-works.co/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/plugin.he-works.co/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#
#     root /var/www;
#
#     # (위 HTTP 블록의 location 블록들을 그대로 복사)
# }
